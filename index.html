<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}
:root{--cyan:#22d3ee;--green:#4ade80;--red:#f87171;--orange:#fb923c;--yellow:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--bg0:#000;--bg1:#050505;--bg2:#0f172a;--bg3:#1f2937;--bg4:#374151;--t1:#f9fafb;--t2:#d1d5db;--t3:#9ca3af;--t4:#6b7280;--t5:#4b5563}
input[type=time],input[type=number],input[type=text],select,textarea{background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--t1);padding:8px 10px;font-size:13px;outline:none;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}

button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.screen{display:none;flex-direction:column;height:100vh}
.screen.active{display:flex}
.fade{animation:fi .18s ease}

.modal-sheet{background:#111827;border-radius:20px 20px 0 0;width:100%;max-width:440px;border-top:1px solid var(--bg3);max-height:90vh;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px}

.btn-primary{background:var(--cyan);color:#000;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;width:100%}

.section-hdr{font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin:12px 0 4px}
.toggle{position:relative;width:40px;height:22px;border-radius:11px;border:none;flex-shrink:0;transition:background .2s;cursor:pointer}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
</style>

<script>
'use strict';

// ═══════════════════════════════════════════════════
// CONFIG — replace CLIENT_ID before deploying
// ═══════════════════════════════════════════════════
const CONFIG = {
  CLIENT_ID: '403195304132-jm6ujak96ac8lm2vp98o85plnvtbfe0u.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.file openid email profile',
  FILE_NAME: 'kairoshift.kash',
  BACKUP_NAME: (d) => `kairoshift_backup_${d}.kash`,
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let STATE = {
  user: null,
  accessToken: null,
  driveFileId: null,
  driveConnected: false,
  entries: {},
  settings: {
    nightStart:22,nightEnd:6,nightRate:1.5,holidayRate:2.0,restDayRate:2.0,
    nightHolidayRate:2.0,otRate:1.5,restHolidayRate:2.5,hourlyRate:7.05,
    cumulativeDLA:true,showWeekNumbers:true,npd:'standard',employerGroup:1,
    pension:false,pensionRate:3.0,pensionCustom:false,terminatedContract:false,
    showPaydays:false,advanceDay:15,salaryDay:25,
  },
  tab: 'calendar',
  viewMode: 'all',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
};

// ═══════════════════════════════════════════════════
// HOLIDAYS
// ═══════════════════════════════════════════════════
const HOLIDAYS = new Set(['2025-01-01','2025-02-16','2025-03-11','2025-04-20','2025-04-21','2025-05-01','2025-06-24','2025-07-06','2025-08-15','2025-11-01','2025-11-02','2025-12-24','2025-12-25','2025-12-26','2026-01-01','2026-02-16','2026-03-11','2026-04-05','2026-04-06','2026-05-01','2026-06-24','2026-07-06','2026-08-15','2026-11-01','2026-11-02','2026-12-24','2026-12-25','2026-12-26']);
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function today(){return ds(new Date())}
function toM(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0)}
function fmtHHMM(m){if(!m||isNaN(m))return'00:00';const h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`}
function toUnits(m){return Math.round((m/15)*25)}
function isHol(d){return HOLIDAYS.has(d)}
function weekNum(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}
function workDays(y,m){let c=0,d=new Date(y,m,1);while(d.getMonth()===m){const dow=d.getDay();if(dow&&dow!==6&&!isHol(ds(d)))c++;d.setDate(d.getDate()+1);}return c}
function el(id){return document.getElementById(id)}
function html(id,h){el(id).innerHTML=h}

// ═══════════════════════════════════════════════════
// NIGHT/DAY HOUR CALCULATION
// ═══════════════════════════════════════════════════
function calcHours(entry){
  if(!entry?.startTime||!entry?.endTime)return{};
  const[sy,sm,sd]=entry.date.split('-').map(Number);
  const sM=toM(entry.startTime);
  let eM=toM(entry.endTime);
  if(eM<=sM)eM+=1440;
  const bks=[];
  if(entry.break1Start&&entry.break1End){let a=toM(entry.break1Start),b=toM(entry.break1End);if(a<sM)a+=1440;if(b<=a)b+=1440;bks.push({s:a,e:b})}
  if(entry.break2Start&&entry.break2End){let a=toM(entry.break2Start),b=toM(entry.break2End);if(a<sM)a+=1440;if(b<=a)b+=1440;bks.push({s:a,e:b})}
  function isN(m){const x=((m%1440)+1440)%1440;return x>=22*60||x<6*60}
  function seg(from,to,bkList){
    let day=0,night=0;
    const pts=new Set([from,to]);
    for(let c=from;c<to;){
      const mod=((c%1440)+1440)%1440;
      const n6=c+(((6*60-mod)+1440)%1440||1440);
      const n22=c+(((22*60-mod)+1440)%1440||1440);
      if(n6>c&&n6<to)pts.add(n6);
      if(n22>c&&n22<to)pts.add(n22);
      const nc=Math.min(n6>c?n6:Infinity,n22>c?n22:Infinity);
      if(nc>=to||nc<=c)break;
      c=nc;
    }
    const sorted=[...pts].sort((a,b)=>a-b);
    const sbks=[...bkList].sort((a,b)=>a.s-b.s);
    let pos=from;
    function add(f,t){
      if(t<=f)return;
      for(let i=0;i<sorted.length-1;i++){
        const ss=sorted[i],se=sorted[i+1];
        if(se<=f||ss>=t)continue;
        const a=Math.max(ss,f),b=Math.min(se,t);
        if(isN((a+b)/2))night+=b-a;else day+=b-a;
      }
    }
    for(const b of sbks){
      const bs=Math.max(b.s,from),be=Math.min(b.e,to);
      if(be>bs&&bs>=pos){add(pos,bs);pos=be;}
      else if(bs<pos&&be>pos)pos=be;
    }
    add(pos,to);
    return{day,night};
  }
  const res={};
  const d1e=Math.min(eM,1440);
  const bk1=bks.map(b=>({s:b.s,e:Math.min(b.e,1440)})).filter(b=>b.e>b.s&&b.s<1440);
  const r1=seg(sM,d1e,bk1);
  res[entry.date]={dayMins:r1.day,nightMins:r1.night};
  if(eM>1440){
    const nd=new Date(sy,sm-1,sd+1);const nds=ds(nd);
    const bk2=bks.map(b=>({s:Math.max(b.s,1440)-1440,e:b.e-1440})).filter(b=>b.e>0&&b.s<eM-1440);
    const r2=seg(0,eM-1440,bk2);
    res[nds]={dayMins:r2.day,nightMins:r2.night};
  }
  return res;
}

function classifyShift(entry){
  if(!entry?.startTime)return'Unknown';
  const sM=toM(entry.startTime),eM0=toM(entry.endTime);
  const eM=eM0<=sM?eM0+1440:eM0;
  const ov=(a1,a2,b1,b2)=>Math.max(0,Math.min(a2,b2)-Math.max(a1,b1));
  const mo=ov(sM,eM,360,855),evo=ov(sM,eM,855,1320),no=ov(sM,eM,1320,1800)+ov(sM,eM,0,360);
  if(mo>120&&evo>120)return'Mid';
  if(no>120)return'Night';
  if(mo>=evo&&mo>0)return'Morning';
  if(evo>mo)return'Evening';
  return'Morning';
}

// ═══════════════════════════════════════════════════
// GOOGLE AUTH
// ═══════════════════════════════════════════════════
function handleGoogleSignIn(response) {
  const payload = parseJwt(response.credential);
  STATE.user = {
    name: payload.name,
    email: payload.email,
    picture: payload.picture,
    sub: payload.sub,
  };
  el('login-status').textContent = 'Signing in...';

  // Request Drive access token via OAuth implicit flow
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: (tokenResponse) => {
      if (tokenResponse.error) {
        el('login-status').textContent = 'Drive access denied. Continuing without sync.';
        launchApp();
        return;
      }
      STATE.accessToken = tokenResponse.access_token;
      loadFromDrive().then(() => launchApp());
    },
  });
  client.requestAccessToken({ prompt: '' });
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(atob(base64));
}

function launchApp() {
  // Load local settings as fallback
  try {
    const ls = localStorage.getItem('ks_settings');
    if (ls) STATE.settings = {...STATE.settings, ...JSON.parse(ls)};
  } catch {}

  // Update UI
  el('sidebar-name').textContent = STATE.user.name;
  el('sidebar-email').textContent = STATE.user.email;
  el('sidebar-user').textContent = STATE.user.email;
  const pic = el('sidebar-pic');
  if (STATE.user.picture) { pic.src = STATE.user.picture; pic.style.display = 'block'; }

  updateChainIcon();

  el('screen-login').classList.remove('active');
  el('screen-app').classList.add('active');
  buildSidebarTabs();
  setTab('calendar');
  scheduleBackup();
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  STATE.user = null;
  STATE.accessToken = null;
  STATE.driveFileId = null;
  STATE.driveConnected = false;
  STATE.entries = {};
  el('screen-app').classList.remove('active');
  el('screen-login').classList.add('active');
  el('login-status').textContent = 'Signed out.';
}

// ═══════════════════════════════════════════════════
// GOOGLE DRIVE SYNC
// ═══════════════════════════════════════════════════
async function driveRequest(method, url, body, extraHeaders = {}) {
  const res = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${STATE.accessToken}`,
      ...extraHeaders,
    },
    body,
  });
  if (!res.ok) throw new Error(`Drive API error: ${res.status}`);
  return res;
}

async function loadFromDrive() {
  if (!STATE.accessToken) return;
  try {
    // Search for existing file
    const search = await driveRequest('GET',
      `https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.FILE_NAME}'+and+trashed=false&fields=files(id,name,modifiedTime)&spaces=drive`
    );
    const data = await search.json();
    if (data.files && data.files.length > 0) {
      STATE.driveFileId = data.files[0].id;
      // Download file content
      const content = await driveRequest('GET',
        `https://www.googleapis.com/drive/v3/files/${STATE.driveFileId}?alt=media`
      );
      const text = await content.text();
      const parsed = JSON.parse(text);
      STATE.entries = parsed.entries || {};
      if (parsed.settings) STATE.settings = {...STATE.settings, ...parsed.settings};
      STATE.driveConnected = true;
    } else {
      // Create new file
      await saveToDrive();
    }
  } catch(e) {
    console.warn('Drive load failed:', e);
    // Fallback to localStorage
    try {
      const local = localStorage.getItem('ks_entries');
      if (local) STATE.entries = JSON.parse(local);
    } catch {}
  }
}

async function saveToDrive() {
  if (!STATE.accessToken) {
    // Fallback to localStorage
    try {
      localStorage.setItem('ks_entries', JSON.stringify(STATE.entries));
      localStorage.setItem('ks_settings', JSON.stringify(STATE.settings));
    } catch {}
    return;
  }
  const content = JSON.stringify({ entries: STATE.entries, settings: STATE.settings, savedAt: new Date().toISOString() });
  const blob = new Blob([content], { type: 'application/json' });

  try {
    if (STATE.driveFileId) {
      // Update existing
      await driveRequest('PATCH',
        `https://www.googleapis.com/upload/drive/v3/files/${STATE.driveFileId}?uploadType=media`,
        blob, { 'Content-Type': 'application/json' }
      );
    } else {
      // Create new with metadata
      const meta = JSON.stringify({ name: CONFIG.FILE_NAME, mimeType: 'application/json' });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', blob);
      const res = await driveRequest('POST',
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        form
      );
      const d = await res.json();
      STATE.driveFileId = d.id;
    }
    STATE.driveConnected = true;
    updateChainIcon();
  } catch(e) {
    console.warn('Drive save failed:', e);
    STATE.driveConnected = false;
    updateChainIcon();
  }
}

async function createBackup() {
  if (!STATE.accessToken || !STATE.driveFileId) return;
  const today = ds(new Date());
  const yesterday = ds(new Date(Date.now() - 86400000));
  const twoDaysAgo = ds(new Date(Date.now() - 172800000));
  try {
    // Copy current file as today's backup
    await driveRequest('POST',
      `https://www.googleapis.com/drive/v3/files/${STATE.driveFileId}/copy`,
      JSON.stringify({ name: CONFIG.BACKUP_NAME(today) }),
      { 'Content-Type': 'application/json' }
    );
    // Delete backup older than 2 days
    const search = await driveRequest('GET',
      `https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.BACKUP_NAME(twoDaysAgo)}'+and+trashed=false&fields=files(id)`
    );
    const old = await search.json();
    if (old.files?.length > 0) {
      await driveRequest('DELETE', `https://www.googleapis.com/drive/v3/files/${old.files[0].id}`);
    }
  } catch(e) { console.warn('Backup failed:', e); }
}

function scheduleBackup() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 5, 0);
  const msToMidnight = midnight - now;
  setTimeout(() => {
    createBackup();
    setInterval(createBackup, 86400000);
  }, msToMidnight);
}

function cycleViewMode() {
  if (STATE.tab !== 'calendar') return;
  STATE.viewMode = STATE.viewMode === 'all' ? 'planned' : STATE.viewMode === 'planned' ? 'factual' : 'all';
  updateViewBanner();
  updateHexDot();
  renderCurrentTab();
}

function updateViewBanner() {
  const b = el('view-banner');
  if (STATE.viewMode !== 'all' && STATE.tab === 'calendar') {
    b.style.display = 'block';
    b.style.background = STATE.viewMode === 'planned' ? 'rgba(34,211,238,.08)' : 'rgba(96,165,250,.08)';

  } else {
    b.style.display = 'none';
  }
}

function updateHexDot() {
  const svg = el('hexdot-svg');
  const active = STATE.viewMode !== 'all' && STATE.tab === 'calendar';
  const circles = svg.querySelectorAll('circle');
  circles.forEach(c => c.setAttribute('fill', active ? '#22d3ee' : 'currentColor'));
  const existing = svg.querySelector('.hex-check');
  if (existing) existing.remove();
  if (active) {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M8 12l2.5 2.5L16 9');
    path.setAttribute('stroke','#4ade80');
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('fill','none');
    path.setAttribute('class','hex-check');
    svg.appendChild(path);
  }
}

function renderCurrentTab() {
  updateViewBanner();
  const c = el('main-content');
  c.innerHTML = '';
  if (STATE.tab === 'calendar') c.appendChild(buildCalendar());
  else if (STATE.tab === 'table') c.appendChild(buildTable());
  else if (STATE.tab === 'graphs') c.appendChild(buildGraphs());
  else if (STATE.tab === 'balances') c.appendChild(buildBalances());

}

// ═══════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════
function buildCalendar() {
  const {calYear:yr, calMonth:mo, entries, settings} = STATE;
  const fd = new Date(yr, mo, 1);
  const ldDay = new Date(yr, mo+1, 0).getDate();
  const firstDow = (fd.getDay()+6)%7;
  const total = Math.ceil((firstDow+ldDay)/7)*7;
  const todayStr = today();

  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-direction:column;height:100%;overflow:hidden';

  // Header
  div.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;flex-shrink:0">
      <div><span style="color:#fff;font-weight:700;font-size:18px">${MONTHS[mo]}</span><span style="color:var(--t4);margin-left:6px;font-size:16px">${yr}</span></div>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1)" style="padding:6px;background:none;border:none;color:var(--t3);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1)" style="padding:6px;background:none;border:none;color:var(--t3);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    <div id="cal-grid-hdr" style="display:grid;grid-template-columns:${settings.showWeekNumbers?'repeat(8,1fr)':'repeat(7,1fr)'};padding:0 6px;flex-shrink:0">
      ${settings.showWeekNumbers?'<div style="text-align:center;font-size:10px;color:#374151;padding:3px 0;font-weight:600">W#</div>':''}
      ${WDAYS.map(d=>`<div style="text-align:center;font-size:11px;color:var(--t5);padding:3px 0;font-weight:500">${d}</div>`).join('')}
    </div>
    <div id="cal-grid" style="flex:1;overflow-y:auto;padding:0 4px"></div>
  `;

  setTimeout(() => {
    const grid = el('cal-grid');
    const weeks = [];
    for (let i=0; i<total; i+=7) {
      const week = [];
      for (let j=0; j<7; j++) {
        const dn = i+j-firstDow+1;
        week.push(dn);
      }
      weeks.push(week);
    }

    weeks.forEach(week => {
      const row = document.createElement('div');
      row.style.cssText = `display:grid;grid-template-columns:${settings.showWeekNumbers?'repeat(8,1fr)':'repeat(7,1fr)'};margin-bottom:2px`;
      if (settings.showWeekNumbers) {
        const validDay = week.find(d => d>=1 && d<=ldDay);
        const wn = validDay ? weekNum(new Date(yr,mo,validDay)) : '';
        const wc = document.createElement('div');
        wc.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:9px;color:#374151;font-weight:600';
        wc.textContent = wn ? `W${wn}` : '';
        row.appendChild(wc);
      }
      week.forEach(dn => {
        const cell = document.createElement('div');
        const inactive = dn<1||dn>ldDay;
        const dstr = !inactive ? ds(new Date(yr,mo,dn)) : null;
        const ent = dstr ? entries[dstr] : null;
        const hol = dstr ? isHol(dstr) : false;
        const hrs = ent?.startTime ? calcHours(ent) : {};
        const nightM = (hrs[dstr]?.nightMins||0);
        const hasNight = nightM > 60;
        const hasNotes = ent?.notes && ent.notes.trim().length > 0;
        const isToday = dstr === todayStr;

        let cType = null;
        if (ent) {
          if (ent.planned && ent.startTime) cType='both';
          else if (ent.planned) cType='planned';
          else if (ent.startTime) cType='factual';
        }
        // View mode filter
        let visible = true;
        if (STATE.viewMode === 'planned' && ent?.startTime) visible = false;
        if (STATE.viewMode === 'factual' && !ent?.startTime) visible = false;

        let circleStyle = '';
        if (cType === 'planned') circleStyle = 'border:2px solid #22d3ee;border-radius:50%';
        else if (cType === 'both') circleStyle = 'background:rgba(34,211,238,.2);border:2px solid #22d3ee;border-radius:50%';
        else if (cType === 'factual') circleStyle = 'background:rgba(34,211,238,.18);border-radius:50%';

        const numColor = hol ? '#f87171' : isToday ? '#22d3ee' : '#f9fafb';
        const numWeight = hasNotes ? '700' : '400';

        cell.style.cssText = `display:flex;flex-direction:column;align-items:center;padding:3px 1px;min-height:52px;border-radius:8px;${inactive?'opacity:.2':'cursor:pointer'}`;
        cell.innerHTML = `
          <div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;position:relative;${circleStyle}">
            <span style="font-size:13px;font-weight:${numWeight};color:${inactive?'#374151':numColor};position:relative;z-index:1;${visible?'':'opacity:.3'}">${dn>=1&&dn<=ldDay?dn:''}</span>
          </div>
          ${hasNight&&!inactive?'<svg width="11" height="11" viewBox="0 0 11 11" fill="#93c5fd"><path d="M9.5 5.7A4 4 0 1 1 4.7.9 3 3 0 0 0 9.5 5.7z"/></svg>':''}
          ${ent?.startTime&&!inactive?`<span style="font-size:9px;color:var(--t5);line-height:1;margin-top:1px">${ent.startTime}</span>`:''}
        `;

        if (!inactive && dstr) {
          let lpTimer;
          cell.addEventListener('mousedown', () => {
            lpTimer = setTimeout(() => showContextMenu(dstr, cell), 600);
          });
          cell.addEventListener('mouseup', () => clearTimeout(lpTimer));
          cell.addEventListener('mouseleave', () => clearTimeout(lpTimer));
          cell.addEventListener('touchstart', () => {
            lpTimer = setTimeout(() => showContextMenu(dstr, cell), 600);
          });
          cell.addEventListener('touchend', () => clearTimeout(lpTimer));
          cell.addEventListener('click', () => showShiftModal(dstr, ent));
        }
        row.appendChild(cell);
      });
      grid.appendChild(row);
    });
  }, 0);

  return div;
}

function calNav(dir) {
  STATE.calMonth += dir;
  if (STATE.calMonth < 0) { STATE.calMonth = 11; STATE.calYear--; }
  if (STATE.calMonth > 11) { STATE.calMonth = 0; STATE.calYear++; }
  renderCurrentTab();
}

            <td style="padding:7px 8px;color:var(--t4)">${e.break2Start||'—'}</td>
            <td style="padding:7px 8px;color:var(--t4)">${e.break2End||'—'}</td>

            <td style="padding:7px 8px;color:var(--yellow);font-family:monospace">00:00</td>

  `;
  return div;
}

// ═══════════════════════════════════════════════════
// GRAPHS VIEW
// ═══════════════════════════════════════════════════
function buildGraphs() {
  const div = document.createElement('div');
  div.style.cssText = 'flex:1;overflow-y:auto;padding:12px 14px';
  div.id = 'graphs-container';
  const yr = STATE.calYear, mo = STATE.calMonth;
  const dim = new Date(yr,mo+1,0).getDate();
  const wls = ['W1','W2','W3','W4','W5'];
  const byType = {plan:[],off:[],hol:[],both:[]};
  const byShift = {am:[],mid:[],pm:[],night:[]};
  for (let w=0; w<5; w++) {
    let pl=0,of=0,ho=0,bo=0,am=0,md=0,pm=0,ni=0;
    for (let d=w*7+1; d<=Math.min((w+1)*7,dim); d++) {
      const date = new Date(yr,mo,d); const dstr = ds(date);
      const e = STATE.entries[dstr]; const ih = isHol(dstr); const iw = date.getDay()===0||date.getDay()===6;
      if (e?.startTime) {
        const h = calcHours(e); const dh = h[dstr]||{dayMins:0,nightMins:0};
        const tot = (dh.dayMins+dh.nightMins)/60;
        if(e.planned)pl+=tot; if(iw&&!ih)of+=tot; if(ih&&!iw)ho+=tot; if(ih&&iw)bo+=tot;
        const sh = classifyShift(e);
        if(sh==='Morning')am+=tot; else if(sh==='Evening')pm+=tot; else if(sh==='Mid')md+=tot; else if(sh==='Night')ni+=tot;
      }
    }
    byType.plan.push(+pl.toFixed(1)); byType.off.push(+of.toFixed(1)); byType.hol.push(+ho.toFixed(1)); byType.both.push(+bo.toFixed(1));
    byShift.am.push(+am.toFixed(1)); byShift.mid.push(+md.toFixed(1)); byShift.pm.push(+pm.toFixed(1)); byShift.night.push(+ni.toFixed(1));
  }

  function miniChart(data, colors) {
    const all = data.flat(); const mx = Math.max(...all, 1);
    const W=280,H=110,pl=28,pr=8,pt=8,pb=18;
    const cw=W-pl-pr,ch=H-pt-pb;
    const step = wls.length>1 ? cw/(wls.length-1) : cw;
    function pathD(series) {
      return series.map((v,i)=>`${i===0?'M':'L'}${pl+i*step},${pt+ch-(v/mx)*ch}`).join(' ');
    }
    const gridLines = [0,.5,1].map(v=>`<line x1="${pl}" y1="${pt+ch*(1-v)}" x2="${W-pr}" y2="${pt+ch*(1-v)}" stroke="#1f2937" stroke-width="1"/>`).join('');
    const yLabels = [0,.5,1].map(v=>`<text x="${pl-3}" y="${pt+ch*(1-v)+4}" text-anchor="end" font-size="8" fill="#4b5563">${Math.round(v*mx)}</text>`).join('');
    const xLabels = wls.map((l,i)=>`<text x="${pl+i*step}" y="${H-3}" text-anchor="middle" font-size="8" fill="#4b5563">${l}</text>`).join('');
    const paths = data.map((s,si)=>`<path d="${pathD(s)}" fill="none" stroke="${colors[si]}" stroke-width="2" stroke-linejoin="round"/>`).join('');
    const dots = data.map((s,si)=>s.map((v,i)=>`<circle cx="${pl+i*step}" cy="${pt+ch-(v/mx)*ch}" r="2.5" fill="${colors[si]}"/>`).join('')).join('');
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px">${gridLines}${yLabels}${xLabels}${paths}${dots}</svg>`;
  }

  div.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="color:#fff;font-weight:700;font-size:16px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('graphs')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('graphs')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    ${[
      {title:'Hours by Day Type', data:[byType.plan,byType.off,byType.hol,byType.both], colors:['#22d3ee','#4ade80','#fbbf24','#f87171'], legend:['Planned','Day Off','Holiday','Hol+Off']},
      {title:'Hours by Shift Type', data:[byShift.am,byShift.mid,byShift.pm,byShift.night], colors:['#fbbf24','#a78bfa','#fb923c','#60a5fa'], legend:['Morning','Mid','Evening','Night']},
    ].map(ch=>`
      <div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--bg3)">
        <div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:8px">${ch.title}</div>
        ${miniChart(ch.data,ch.colors)}
        <div style="display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:8px">
          ${ch.legend.map((l,i)=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${ch.colors[i]}"></div><span style="font-size:10px;color:var(--t4)">${l}</span></div>`).join('')}
        </div>
      </div>
    `).join('')}
  `;
  return div;
}

// ═══════════════════════════════════════════════════
// BALANCES VIEW
// ═══════════════════════════════════════════════════
function buildBalances() {
  const yr = STATE.calYear, mo = STATE.calMonth;
  const wd = workDays(yr,mo); const tgt = wd*8;
  let planM=0,factM=0;
  const dim = new Date(yr,mo+1,0).getDate();
  for (let d=1; d<=dim; d++) {
    const dstr = ds(new Date(yr,mo,d)); const e = STATE.entries[dstr];
    if (!e?.startTime) continue;
    const h = calcHours(e); const dh = h[dstr]||{dayMins:0,nightMins:0};
    const t = dh.dayMins+dh.nightMins;
    if(e.planned)planM+=t; factM+=t;
  }
  const diff = factM - tgt*60;
  const rows = [
    {l:'Target Hours (Cumulative DLA)',v:fmtHHMM(tgt*60),u:toUnits(tgt*60),c:'#d1d5db'},
    {l:'Leave Accrual',v:'1.67 days',u:'—',c:'#4ade80'},
    {l:'Planned Hours',v:fmtHHMM(planM),u:toUnits(planM),c:'#22d3ee'},
    {l:'Factual Hours',v:fmtHHMM(factM),u:toUnits(factM),c:'#60a5fa'},
    {l:'Surplus / Deficit',v:(diff>=0?'+':'')+fmtHHMM(Math.abs(diff)),u:(diff>=0?'+':'-')+toUnits(Math.abs(diff)),c:diff>=0?'#4ade80':'#f87171'},
  ];
  const div = document.createElement('div');
  div.style.cssText = 'flex:1;overflow-y:auto;padding:12px 14px';
  div.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="color:#fff;font-weight:700;font-size:18px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('balances')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('balances')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    ${rows.map((r,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg2);border-radius:12px;margin-bottom:6px;border:${i===4?'1px solid #374151':'1px solid var(--bg3)'};${i===4?'margin-top:8px':''}">
        <span style="font-size:13px;color:var(--t4)">${r.l}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:10px;color:var(--t5)">${r.u} U</span>
          <span style="font-size:13px;font-weight:700;font-family:monospace;color:${r.c}">${r.v}</span>
        </div>
      </div>
    `).join('')}
    <div style="background:var(--bg2);border-radius:12px;padding:14px;margin-top:12px;border:1px solid var(--bg3)">
      <div style="font-size:11px;color:var(--t5);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Summary</div>
      ${[['Working days',wd],['Standard hours (8h/day)',`${tgt}h`],['Leave balance','1.67 days']].map(([l,v],i)=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;${i<2?'border-bottom:1px solid #111827':''}">
          <span style="color:var(--t4)">${l}</span><span style="color:var(--t1);font-weight:600">${v}</span>
        </div>
      `).join('')}
    </div>
  `;
  return div;
}

// ═══════════════════════════════════════════════════
// PAYSLIP VIEW
// ═══════════════════════════════════════════════════
function buildPayslip() {
  const yr = STATE.calYear, mo = STATE.calMonth;
  const s = STATE.settings;
  const dim = new Date(yr,mo+1,0).getDate();
  let dayM=0,nightM=0,wDays=0;
  for (let d=1; d<=dim; d++) {
    const dstr = ds(new Date(yr,mo,d)); const e = STATE.entries[dstr];
    if (!e?.startTime) continue;
    const h = calcHours(e); const dh = h[dstr]||{dayMins:0,nightMins:0};
    dayM+=dh.dayMins; nightM+=dh.nightMins; wDays++;
  }
  const totalH = (dayM+nightM)/60, nightH = nightM/60;
  const base = totalH*s.hourlyRate;
  const nightP = nightH*s.hourlyRate*(s.nightRate-1);
  const gross = base+nightP;
  const npd = s.npd==='none'?0:s.npd==='standard'?400:300;
  const gpm = Math.max(0,gross-npd)*0.20;
  const sodra = gross*0.195;
  const pension = s.pension ? gross*(s.pensionCustom?s.pensionRate/100:.03) : 0;
  const deduct = gpm+sodra+pension;
  const net = gross-deduct;
  const empTax = gross*0.0316;
  const mLbl = `${String(mo+1).padStart(2,'0')}/${yr}`;

  function tRow(code,name,m,days,hrs,sum,c='#9ca3af',bold=false){
    return `<tr style="border-bottom:1px solid rgba(31,41,55,.5)">
      <td style="padding:7px 8px;font-size:10px;color:var(--t5);font-family:monospace;white-space:nowrap">${code}</td>
      <td style="padding:7px 8px;font-size:11px;color:${c};font-weight:${bold?700:400};white-space:nowrap">${name}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${m||''}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${days||'—'}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${hrs||'—'}</td>
      <td style="padding:7px 8px;font-size:11px;font-weight:700;text-align:right;color:${c};white-space:nowrap">${sum}</td>
    </tr>`;
  }
  function secRow(label,c){return`<tr><td colspan="6" style="padding:6px 8px;font-size:10px;color:${c};font-weight:700;background:rgba(31,41,55,.4);letter-spacing:.08em;text-transform:uppercase">${label}</td></tr>`}
  function totRow(label,days,hrs,sum,c){return`<tr style="background:rgba(31,41,55,.3)"><td colspan="3" style="padding:8px;font-size:11px;font-weight:700;color:${c}">${label}</td><td style="padding:8px;font-size:11px;color:#fff;text-align:center;font-weight:700">${days||''}</td><td style="padding:8px;font-size:11px;color:#fff;text-align:center;font-weight:700">${hrs||''}</td><td style="padding:8px;font-size:12px;font-weight:700;text-align:right;color:${c}">${sum}</td></tr>`}

  const div = document.createElement('div');
  div.style.cssText = 'flex:1;overflow-y:auto;padding:10px 8px';
  div.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 6px">
      <span style="color:#fff;font-weight:700;font-size:17px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('payslip')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('payslip')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    <div style="background:var(--bg2);border-radius:14px;overflow:hidden;border:1px solid var(--bg3)">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:rgba(31,41,55,.6)">
          ${['Code','Name','Mo','Days','Hrs','Sum €'].map(h=>`<th style="padding:8px 8px;font-size:10px;color:var(--t5);font-weight:500;text-align:${h==='Sum €'?'right':'left'};border-bottom:1px solid var(--bg3);white-space:nowrap">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${secRow('Priskaityta — Gross','#22d3ee')}
          ${tRow('1','Base Salary',mLbl,wDays,totalH.toFixed(2),`${base.toFixed(2)}€`,'#f9fafb',true)}
          ${nightH>0?tRow('1.1','Night Work Premium',mLbl,'',nightH.toFixed(2),`${nightP.toFixed(2)}€`,'#60a5fa'):''}
          ${totRow('GROSS TOTAL:',wDays,totalH.toFixed(2),`${gross.toFixed(2)}€`,'#22d3ee')}
          ${secRow('Atskaityta — Deductions','#f87171')}
          ${tRow('1-20','Income Tax (GPM 20%)',mLbl,'','',`-${gpm.toFixed(2)}€`,'#f87171')}
          ${tRow('11-22.5','Employee Social Ins. 19.5%',mLbl,'','',`-${sodra.toFixed(2)}€`,'#fb923c')}
          ${s.pension?tRow('3',`Pension Fund ${s.pensionCustom?s.pensionRate:3}%`,mLbl,'','',`-${pension.toFixed(2)}€`,'#fb923c'):''}
          ${totRow('DEDUCTIONS TOTAL:','','',`-${deduct.toFixed(2)}€`,'#f87171')}
          ${secRow('Išmokėta — Net Pay','#4ade80')}
          ${totRow('NET PAY:',wDays,totalH.toFixed(2),`${net.toFixed(2)}€`,'#4ade80')}
        </tbody>
      </table>
      <div style="border-top:2px solid var(--bg4);padding:10px 12px">
        ${[['Accrued Leave','+1.67 days','#4ade80'],['Leave Balance','1.67 days','#4ade80'],['Employer Tax (SoDra ~3.16%)',`${empTax.toFixed(2)}€`,'#fbbf24'],['Hourly Rate',`${s.hourlyRate.toFixed(2)}€/hr`,'#9ca3af'],['NPD Applied',`${npd.toFixed(2)}€`,'#9ca3af']].map(([l,v,c],i)=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;${i<4?'border-bottom:1px solid rgba(31,41,55,.5)':''}">
            <span style="color:var(--t4)">${l}</span><span style="color:${c};font-weight:600;font-family:monospace">${v}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  return div;
}

function saveSettings() {
  const g = (id) => { const e = el(id); return e ? e.value : null; };
  const gb = (id) => { const e = el(id); return e ? e.dataset.on === '1' : STATE.settings[id.replace('s-','')]; };
  const gf = (id) => parseFloat(g(id)) || 0;
  const gi = (id) => parseInt(g(id)) || 1;
  STATE.settings = {
    nightStart: gf('s-nightStart'), nightEnd: gf('s-nightEnd'),
    nightRate: gf('s-nightRate'), holidayRate: gf('s-holidayRate'),
    restDayRate: gf('s-restDayRate'), nightHolidayRate: gf('s-nightHolidayRate'),
    otRate: gf('s-otRate'), restHolidayRate: gf('s-restHolidayRate'),
    hourlyRate: gf('s-hourlyRate'),
    cumulativeDLA: gb('s-cumulativeDLA'), showWeekNumbers: gb('s-showWeekNumbers'),
    npd: g('s-npd') || STATE.settings.npd,
    employerGroup: gi('s-employerGroup'),
    pension: gb('s-pension'), pensionRate: gf('s-pensionRate'), pensionCustom: gb('s-pensionCustom'),
    terminatedContract: gb('s-terminatedContract'),
    showPaydays: gb('s-showPaydays'), advanceDay: gi('s-advanceDay'), salaryDay: gi('s-salaryDay'),
  };
  saveToDrive();
  closeModal();
  renderCurrentTab();
  showToast('Settings saved');
}

function exportJSON() {
  const data = JSON.stringify({ entries: STATE.entries, exportedAt: new Date().toISOString() }, null, 2);
  downloadFile('kairoshift_export.json', data, 'application/json');
  showToast('JSON exported');
}

function exportCSV() {
  const cols = ['date','startTime','endTime','break1Start','break1End','break2Start','break2End','dayMins','nightMins','dayUnits','nightUnits','planned','holiday'];
  const rows = Object.entries(STATE.entries).sort(([a],[b])=>a.localeCompare(b)).map(([date,e]) => {
    const h = calcHours(e); const dh = h[date]||{dayMins:0,nightMins:0};
    return [date,e.startTime||'',e.endTime||'',e.break1Start||'',e.break1End||'',e.break2Start||'',e.break2End||'',
      fmtHHMM(dh.dayMins),fmtHHMM(dh.nightMins),toUnits(dh.dayMins),toUnits(dh.nightMins),
      e.planned?'Yes':'No',isHol(date)?'Yes':'No'].join(',');
  });
  downloadFile('kairoshift_export.csv', [cols.join(','),...rows].join('\n'), 'text/csv');
  showToast('CSV exported');
}

function downloadFile(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name;
  a.click();
}

let toastTimer;
function showToast(msg, color = '#22d3ee') {
  let t = el('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;transition:opacity .3s;pointer-events:none;max-width:280px;text-align:center';
    document.body.appendChild(t);
  }
  t.style.background = color;
  t.style.color = color === '#22d3ee' ? '#000' : '#fff';
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.opacity = '0', 2500);
}
