<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --cyan:#22d3ee;--green:#4ade80;--red:#f87171;--orange:#fb923c;
  --yellow:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--pink:#f472b6;
  --bg0:#000;--bg1:#050505;--bg2:#0f172a;--bg3:#1f2937;--bg4:#374151;
  --t1:#f9fafb;--t2:#d1d5db;--t3:#9ca3af;--t4:#6b7280;--t5:#4b5563;
  /* shift type colors */
  --col-planned:#22d3ee;      /* blue-cyan: planned */
  --col-rest:#a78bfa;         /* purple: rest day unplanned */
  --col-holiday:#4ade80;      /* green: holiday work */
  --col-sick:#fb923c;         /* orange: sick leave */
  --col-vacation:#f472b6;     /* pink: annual leave */
}
input[type=time],input[type=number],input[type=text],select,textarea{
  background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;
  color:var(--t1);padding:8px 10px;font-size:13px;outline:none;width:100%;font-family:inherit
}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
select option{background:var(--bg2)}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.active{display:flex}
.fade{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.modal-wrap{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.87);display:flex;align-items:center;justify-content:center}
.modal-bottom{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#111827;border-radius:18px;width:95%;max-width:400px;border:1px solid var(--bg3);max-height:90vh;max-height:90dvh;display:flex;flex-direction:column}
.modal-sheet{background:#111827;border-radius:20px 20px 0 0;width:100%;max-width:440px;border-top:1px solid var(--bg3);max-height:92vh;max-height:92dvh;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px;-webkit-overflow-scrolling:touch}
.modal-footer{padding:12px 18px;border-top:1px solid var(--bg3);flex-shrink:0}
.btn-primary{background:var(--cyan);color:#000;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;width:100%}
.btn-secondary{background:var(--bg3);color:var(--t2);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;width:100%}
.btn-danger{background:#dc2626;color:#fff;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;flex:1}
.btn-reset{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;width:100%;margin-top:8px}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #111827}
.row-lbl{font-size:12px;color:var(--t2)}
.section-hdr{font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin:12px 0 4px}
.toggle{position:relative;width:40px;height:22px;border-radius:11px;border:none;flex-shrink:0;transition:background .2s;cursor:pointer}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.sb-btn{width:100%;display:block;padding:11px 16px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;text-align:left;font-family:inherit}
.sb-btn:active{background:var(--bg3);color:var(--t1)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;background:none;border:none;min-width:52px;flex:1;transition:color .15s}
/* progress bar */
.prog-wrap{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:6px;transition:width .4s ease}
/* table row hover */
.trow:active{background:rgba(34,211,238,.05)!important}
/* attr chips */
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;margin:2px}
</style>
</head>

<script>
'use strict';

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CONFIG = {
  CLIENT_ID: '403195304132-jm6ujak96ac8lm2vp98o85plnvtbfe0u.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.file openid email profile',
  FILE_NAME: 'kairoshift.kash',
  BACKUP_NAME: d => `kairoshift_backup_${d}.kash`,
};

// ═══════════════════════════════════════════════
// DEFAULT SETTINGS (single source of truth)
// ═══════════════════════════════════════════════
const DEFAULT_SETTINGS = {
  nightStart:22, nightEnd:6,
  nightRate:1.5, holidayRate:2.0, restDayRate:2.0,
  nightHolidayRate:2.0, otRate:1.5, restHolidayRate:2.5,
  hourlyRate:7.05,
  workDayHours:8,           // FIX #7: work day duration netto
  cumulativeDLA:true,
  showWeekNumbers:true,
  showPaydays:false, advanceDay:15, salaryDay:25,
  npd:'standard', employerGroup:1,
  pension:false, pensionRate:3.0, pensionCustom:false,
  terminatedContract:false,
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let STATE = {
  user: null, accessToken: null, driveFileId: null, driveConnected: false,
  entries: {},
  settings: {...DEFAULT_SETTINGS},
  tab: 'calendar', viewMode: 'all',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
};

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const HOLIDAYS = new Set([
  '2025-01-01','2025-02-16','2025-03-11','2025-04-20','2025-04-21',
  '2025-05-01','2025-06-24','2025-07-06','2025-08-15','2025-11-01',
  '2025-11-02','2025-12-24','2025-12-25','2025-12-26',
  '2026-01-01','2026-02-16','2026-03-11','2026-04-05','2026-04-06',
  '2026-05-01','2026-06-24','2026-07-06','2026-08-15','2026-11-01',
  '2026-11-02','2026-12-24','2026-12-25','2026-12-26',
]);
const MONTHS = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
const WDAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const el = id => document.getElementById(id);
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function today(){return ds(new Date())}
function toM(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0)}
function fmtHHMM(m){
  if(m==null||isNaN(m))return'00:00';
  const abs=Math.abs(m);
  return`${String(Math.floor(abs/60)).padStart(2,'0')}:${String(abs%60).padStart(2,'0')}`;
}
function fmtDuration(mins){
  // Returns "7:45" style
  if(!mins||isNaN(mins)||mins<=0)return'';
  const h=Math.floor(mins/60),m=mins%60;
  return m>0?`${h}:${String(m).padStart(2,'0')}`:`${h}h`;
}
function toUnits(m){return Math.round((m/15)*25)}
function isHol(d){return HOLIDAYS.has(d)}
function weekNum(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-y)/86400000)+1)/7);
}
function workDays(y,m){
  let c=0,d=new Date(y,m,1);
  while(d.getMonth()===m){const dow=d.getDay();if(dow&&dow!==6&&!isHol(ds(d)))c++;d.setDate(d.getDate()+1);}
  return c;
}
function getAdjustedPayday(y,m,day){
  let d=new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate()));
  while(true){const dow=d.getDay();const dstr=ds(d);if(dow!==0&&dow!==6&&!isHol(dstr))break;d.setDate(d.getDate()-1);}
  return d;
}

// ═══════════════════════════════════════════════
// HOUR CALCULATION
// ═══════════════════════════════════════════════
function calcHours(entry){
  if(!entry?.startTime||!entry?.endTime)return{};
  const[sy,sm,sd]=entry.date.split('-').map(Number);
  const sM=toM(entry.startTime);
  let eM=toM(entry.endTime);
  if(eM<=sM)eM+=1440;
  const bks=[];
  if(entry.break1Start&&entry.break1End){
    let a=toM(entry.break1Start),b=toM(entry.break1End);
    if(a<sM)a+=1440;if(b<=a)b+=1440;bks.push({s:a,e:b});
  }
  if(entry.break2Start&&entry.break2End){
    let a=toM(entry.break2Start),b=toM(entry.break2End);
    if(a<sM)a+=1440;if(b<=a)b+=1440;bks.push({s:a,e:b});
  }
  function isN(m){const x=((m%1440)+1440)%1440;return x>=22*60||x<6*60}
  function seg(from,to,bkList){
    let day=0,night=0;
    const pts=new Set([from,to]);
    for(let c=from;c<to;){
      const mod=((c%1440)+1440)%1440;
      const n6=c+(((6*60-mod)+1440)%1440||1440);
      const n22=c+(((22*60-mod)+1440)%1440||1440);
      if(n6>c&&n6<to)pts.add(n6);
      if(n22>c&&n22<to)pts.add(n22);
      const nc=Math.min(n6>c?n6:Infinity,n22>c?n22:Infinity);
      if(nc>=to||nc<=c)break;c=nc;
    }
    const sorted=[...pts].sort((a,b)=>a-b);
    const sbks=[...bkList].sort((a,b)=>a.s-b.s);
    let pos=from;
    function add(f,t){
      if(t<=f)return;
      for(let i=0;i<sorted.length-1;i++){
        const ss=sorted[i],se=sorted[i+1];
        if(se<=f||ss>=t)continue;
        const a=Math.max(ss,f),b=Math.min(se,t);
        if(isN((a+b)/2))night+=b-a;else day+=b-a;
      }
    }
    for(const b of sbks){
      const bs=Math.max(b.s,from),be=Math.min(b.e,to);
      if(be>bs&&bs>=pos){add(pos,bs);pos=be;}
      else if(bs<pos&&be>pos)pos=be;
    }
    add(pos,to);
    return{day,night};
  }
  const res={};
  const d1e=Math.min(eM,1440);
  const bk1=bks.map(b=>({s:b.s,e:Math.min(b.e,1440)})).filter(b=>b.e>b.s&&b.s<1440);
  const r1=seg(sM,d1e,bk1);
  res[entry.date]={dayMins:r1.day,nightMins:r1.night};
  if(eM>1440){
    const nd=new Date(sy,sm-1,sd+1);const nds=ds(nd);
    const bk2=bks.map(b=>({s:Math.max(b.s,1440)-1440,e:b.e-1440})).filter(b=>b.e>0&&b.s<eM-1440);
    const r2=seg(0,eM-1440,bk2);
    res[nds]={dayMins:r2.day,nightMins:r2.night};
  }
  return res;
}

function totalNetMins(entry,date){
  if(!entry?.startTime)return 0;
  const h=calcHours(entry);
  const dh=h[date]||{dayMins:0,nightMins:0};
  return dh.dayMins+dh.nightMins;
}

function classifyShift(entry){
  if(!entry?.startTime)return'Unknown';
  const sM=toM(entry.startTime),eM0=toM(entry.endTime);
  const eM=eM0<=sM?eM0+1440:eM0;
  const ov=(a1,a2,b1,b2)=>Math.max(0,Math.min(a2,b2)-Math.max(a1,b1));
  const mo=ov(sM,eM,360,855),evo=ov(sM,eM,855,1320),no=ov(sM,eM,1320,1800)+ov(sM,eM,0,360);
  if(mo>120&&evo>120)return'Mid';
  if(no>120)return'Night';
  if(mo>=evo&&mo>0)return'Morning';
  if(evo>mo)return'Evening';
  return'Morning';
}

// Returns color for a day cell based on entry attributes
function entryColor(entry,date){
  if(!entry)return null;
  const hol=entry.isHoliday||isHol(date);
  if(entry.sickLeave)return'var(--col-sick)';
  if(entry.annualLeave)return'var(--col-vacation)';
  if(hol&&entry.startTime)return'var(--col-holiday)';
  const isWeekend=new Date(date).getDay()===0||new Date(date).getDay()===6;
  if((isWeekend||entry.restDay)&&!entry.plannedShift&&entry.startTime)return'var(--col-rest)';
  if(entry.startTime)return'var(--col-planned)';
  return null;
}

// GOOGLE AUTH
// ═══════════════════════════════════════════════
function handleGoogleSignIn(response){
  const payload=parseJwt(response.credential);
  STATE.user={name:payload.name,email:payload.email,picture:payload.picture,sub:payload.sub};
  el('login-status').textContent='Connecting to Drive...';
  const client=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:CONFIG.SCOPES,
    callback:(tok)=>{
      if(tok.error){el('login-status').textContent='Drive access denied. Using local storage.';launchApp();return;}
      STATE.accessToken=tok.access_token;
      loadFromDrive().then(()=>launchApp());
    },
  });
  client.requestAccessToken({prompt:''});
}

function parseJwt(token){
  const b=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(atob(b));
}

function launchApp(){
  // Restore local settings as merge fallback
  try{const ls=localStorage.getItem('ks_s');if(ls){const p=JSON.parse(ls);STATE.settings={...DEFAULT_SETTINGS,...p};}}catch{}

  el('sidebar-name').textContent=STATE.user.name;
  el('sidebar-email').textContent=STATE.user.email;
  el('sidebar-user').textContent=STATE.user.email;
  const pic=el('sidebar-pic');
  if(STATE.user.picture){pic.src=STATE.user.picture;pic.style.display='block';}
  updateChainIcon();
  el('screen-login').classList.remove('active');
  el('screen-app').classList.add('active');
  buildSidebarTabs();
  setTab('calendar');
  scheduleBackup();
}

function signOut(){
  google.accounts.id.disableAutoSelect();
  STATE={...STATE,user:null,accessToken:null,driveFileId:null,driveConnected:false,entries:{},settings:{...DEFAULT_SETTINGS}};
  el('screen-app').classList.remove('active');
  el('screen-login').classList.add('active');
  el('login-status').textContent='Signed out.';
}

// ═══════════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════════
async function driveReq(method,url,body,extraH={}){
  const res=await fetch(url,{method,headers:{Authorization:`Bearer ${STATE.accessToken}`,...extraH},body});
  if(!res.ok)throw new Error(`Drive ${res.status}`);
  return res;
}

async function loadFromDrive(){
  if(!STATE.accessToken)return;
  try{
    const s=await driveReq('GET',`https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.FILE_NAME}'+and+trashed=false&fields=files(id)&spaces=drive`);
    const d=await s.json();
    if(d.files?.length>0){
      STATE.driveFileId=d.files[0].id;
      const c=await driveReq('GET',`https://www.googleapis.com/drive/v3/files/${STATE.driveFileId}?alt=media`);
      const parsed=JSON.parse(await c.text());
      STATE.entries=parsed.entries||{};
      // FIX: merge with defaults to avoid missing keys
      if(parsed.settings)STATE.settings={...DEFAULT_SETTINGS,...parsed.settings};
      STATE.driveConnected=true;
    } else {
      await saveToDrive();
    }
  }catch(e){
    console.warn('Drive load:',e);
    try{const l=localStorage.getItem('ks_e');if(l)STATE.entries=JSON.parse(l);}catch{}
  }
}

async function saveToDrive(){
  // Always merge with defaults before saving (prevents 0-value bug)
  STATE.settings={...DEFAULT_SETTINGS,...STATE.settings};
  const content=JSON.stringify({entries:STATE.entries,settings:STATE.settings,savedAt:new Date().toISOString()});
  const blob=new Blob([content],{type:'application/json'});
  if(!STATE.accessToken){
    try{localStorage.setItem('ks_e',JSON.stringify(STATE.entries));localStorage.setItem('ks_s',JSON.stringify(STATE.settings));}catch{}
    return;
  }
  try{
    if(STATE.driveFileId){
      await driveReq('PATCH',`https://www.googleapis.com/upload/drive/v3/files/${STATE.driveFileId}?uploadType=media`,blob,{'Content-Type':'application/json'});
    } else {
      const meta=JSON.stringify({name:CONFIG.FILE_NAME,mimeType:'application/json'});
      const form=new FormData();
      form.append('metadata',new Blob([meta],{type:'application/json'}));
      form.append('file',blob);
      const r=await driveReq('POST','https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',form);
      STATE.driveFileId=(await r.json()).id;
    }
    STATE.driveConnected=true;updateChainIcon();
  }catch(e){console.warn('Drive save:',e);STATE.driveConnected=false;updateChainIcon();}
}

async function createBackup(){
  if(!STATE.accessToken||!STATE.driveFileId)return;
  const twoAgo=ds(new Date(Date.now()-172800000));
  try{
    await driveReq('POST',`https://www.googleapis.com/drive/v3/files/${STATE.driveFileId}/copy`,
      JSON.stringify({name:CONFIG.BACKUP_NAME(ds(new Date()))}),{'Content-Type':'application/json'});
    const s=await driveReq('GET',`https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.BACKUP_NAME(twoAgo)}'+and+trashed=false&fields=files(id)`);
    const old=await s.json();
    if(old.files?.length>0)await driveReq('DELETE',`https://www.googleapis.com/drive/v3/files/${old.files[0].id}`);
  }catch(e){console.warn('Backup:',e);}
}

function scheduleBackup(){
  const now=new Date(),mn=new Date(now);
  mn.setHours(24,0,5,0);
  setTimeout(()=>{createBackup();setInterval(createBackup,86400000);},mn-now);
}

// ═══════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════
function buildCalendar(){
  const{calYear:yr,calMonth:mo,entries,settings}=STATE;
  const fd=new Date(yr,mo,1),ldDay=new Date(yr,mo+1,0).getDate();
  const firstDow=(fd.getDay()+6)%7;
  const total=Math.ceil((firstDow+ldDay)/7)*7;
  const todayStr=today();
  const workDayMins=settings.workDayHours*60;

  const div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;height:100%;overflow:hidden;';

  // Payday dates
  let paydaySet=new Set();
  if(settings.showPaydays){
    if(settings.advanceDay){const pd=getAdjustedPayday(yr,mo,settings.advanceDay);paydaySet.add(ds(pd));}
    if(settings.salaryDay){const pd=getAdjustedPayday(yr,mo,settings.salaryDay);paydaySet.add(ds(pd));}
  }

  const cols=settings.showWeekNumbers?'repeat(8,1fr)':'repeat(7,1fr)';

  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;flex-shrink:0">
      <div>
        <span style="color:#fff;font-weight:700;font-size:18px">${MONTHS[mo]}</span>
        <span style="color:var(--t4);margin-left:6px;font-size:16px">${yr}</span>
      </div>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1)" style="padding:6px;background:none;border:none;color:var(--t3);cursor:pointer">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg>
        </button>
        <button onclick="calNav(1)" style="padding:6px;background:none;border:none;color:var(--t3);cursor:pointer">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg>
        </button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:${cols};padding:0 6px;flex-shrink:0;border-bottom:1px solid #111827;padding-bottom:4px">
      ${settings.showWeekNumbers?'<div style="text-align:center;font-size:10px;color:#1e3a5f;padding:3px 0;font-weight:700">W</div>':''}
      ${WDAYS.map(d=>`<div style="text-align:center;font-size:11px;color:var(--t5);padding:3px 0;font-weight:500">${d}</div>`).join('')}
    </div>
    <div id="cal-grid" style="flex:1;overflow-y:auto;padding:2px 4px 4px;-webkit-overflow-scrolling:touch"></div>
  `;

  // Swipe support for calendar
  let touchStartX=0,touchStartY=0,touchStartTime=0;
  div.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    touchStartTime=Date.now();
  },{passive:true});
  div.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    const dt=Date.now()-touchStartTime;
    if(dt>400)return; // too slow = long press
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      if(dx<0)calNav(1);else calNav(-1);
    } else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>60){
      if(dy<0){STATE.calYear++;renderCurrentTab();}
      else{STATE.calYear--;renderCurrentTab();}
    }
  },{passive:true});

  setTimeout(()=>{
    const grid=el('cal-grid');
    for(let wi=0;wi<total/7;wi++){
      const row=document.createElement('div');
      row.style.cssText=`display:grid;grid-template-columns:${cols};margin-bottom:1px`;
      const weekCells=[];
      for(let ci=0;ci<7;ci++)weekCells.push(wi*7+ci-firstDow+1);

      if(settings.showWeekNumbers){
        const validDay=weekCells.find(d=>d>=1&&d<=ldDay);
        const wn=validDay?weekNum(new Date(yr,mo,validDay)):'';
        const wc=document.createElement('div');
        // FIX #8: week number shown as plain number, different color, no "W" prefix
        wc.style.cssText='display:flex;align-items:center;justify-content:center;font-size:9px;color:#1e3a5f;font-weight:700';
        wc.textContent=wn||'';
        row.appendChild(wc);
      }

      weekCells.forEach(dn=>{
        const cell=document.createElement('div');
        const inactive=dn<1||dn>ldDay;
        const dstr=!inactive?ds(new Date(yr,mo,dn)):null;
        const ent=dstr?entries[dstr]:null;
        const hol=dstr?(ent?.isHoliday||isHol(dstr)):false;
        const isWeekend=dstr?(new Date(yr,mo,dn).getDay()===0||new Date(yr,mo,dn).getDay()===6):false;
        const isToday=dstr===todayStr;
        const isPayday=dstr&&paydaySet.has(dstr);
        const hasNotes=ent?.notes&&ent.notes.trim().length>0;
        const isOvernight=ent?.startTime&&toM(ent.endTime||'')<=toM(ent.startTime||'');

        // FIX #7: overtime/deficit indicator
        let diffMins=null;
        if(ent?.startTime){
          const net=totalNetMins(ent,dstr);
          diffMins=net-workDayMins;
        } else if(ent?.sickLeave||ent?.annualLeave){
          diffMins=0;
        }

        // Circle/oval style
        const color=entryColor(ent,dstr);
        let circleStyle='';
        let shapeType='circle'; // 'circle' or 'oval'
        if(color){
          const hasPlanned=ent?.plannedShift;
          if(isOvernight){
            // FIX #8: overnight = oval (figure-8 / landscape ellipse)
            shapeType='oval';
            circleStyle=`background:${color}33;border:2px solid ${color};border-radius:40%;`;
          } else if(hasPlanned&&ent?.startTime){
            circleStyle=`background:${color}28;border:2px solid ${color};border-radius:50%;`;
          } else if(ent?.startTime){
            circleStyle=`background:${color}28;border-radius:50%;`;
          }
        }

        // Net time display
        let durationStr='';
        if(ent?.startTime&&dstr){
          const net=totalNetMins(ent,dstr);
          durationStr=fmtDuration(net);
        }
        if(ent?.sickLeave)durationStr='SL';
        if(ent?.annualLeave)durationStr='AL';

        // Number color
        let numColor=inactive?'#374151':hol?'#f87171':isPayday?'#4ade80':isToday?'#22d3ee':'#f9fafb';
        let numWeight=hasNotes||isPayday?'700':'400';

        // Diff indicator
        let diffHtml='';
        if(diffMins!==null&&diffMins!==0&&ent?.startTime){
          const sign=diffMins>0?'+':'−';
          const col=diffMins>0?'#4ade80':'#f87171';
          diffHtml=`<span style="position:absolute;top:-2px;right:-1px;font-size:9px;font-weight:700;color:${col};line-height:1">${sign}</span>`;
        }

        cell.style.cssText=`display:flex;flex-direction:column;align-items:center;padding:2px 1px;min-height:${durationStr?54:48}px;border-radius:8px;${inactive?'opacity:.2':'cursor:pointer;'}`;

        cell.innerHTML=`
          <div style="width:${shapeType==='oval'?'34px':'30px'};height:30px;display:flex;align-items:center;justify-content:center;position:relative;${circleStyle}flex-shrink:0">
            <span style="font-size:13px;font-weight:${numWeight};color:${numColor};position:relative;z-index:1">${dn>=1&&dn<=ldDay?dn:''}</span>
            ${diffHtml}
          </div>
          ${durationStr?`<span style="font-size:9px;color:${color||'var(--t5)'};line-height:1;margin-top:2px;font-weight:600">${durationStr}</span>`:''}
        `;

        if(!inactive&&dstr){
          let lpTimer;
          const startLp=(clientX,clientY)=>{
            lpTimer=setTimeout(()=>{
              const rect=cell.getBoundingClientRect();
              showContextMenu(dstr,{x:Math.min(rect.right,window.innerWidth-200),y:Math.min(rect.bottom+4,window.innerHeight-220)});
            },600);
          };
          cell.addEventListener('mousedown',e=>startLp(e.clientX,e.clientY));
          cell.addEventListener('mouseup',()=>clearTimeout(lpTimer));
          cell.addEventListener('mouseleave',()=>clearTimeout(lpTimer));
          cell.addEventListener('touchstart',e=>{const t=e.touches[0];startLp(t.clientX,t.clientY);},{passive:true});
          cell.addEventListener('touchend',e=>{clearTimeout(lpTimer);},{passive:true});
          cell.addEventListener('click',()=>showShiftModal(dstr,ent));
        }
        row.appendChild(cell);
      });
      grid.appendChild(row);
    }
  },0);
  return div;
}

function calNav(dir){
  STATE.calMonth+=dir;
  if(STATE.calMonth<0){STATE.calMonth=11;STATE.calYear--;}
  if(STATE.calMonth>11){STATE.calMonth=0;STATE.calYear++;}
  renderCurrentTab();
}

            ${chkAttr('Sick Leave','sh-sick',e.sickLeave||false,'var(--col-sick)')}
            ${chkAttr('Annual Leave','sh-annual',e.annualLeave||false,'var(--col-vacation)')}
          </div>

          <!-- Notes -->
          <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--t5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Notes</div>
            <textarea id="sh-notes" rows="2" placeholder="Shift notes..." style="resize:none;width:100%">${e.notes||''}</textarea>
          </div>
          <button onclick="addExtraBlock()" style="width:100%;padding:9px;margin-bottom:10px;font-size:12px;color:var(--cyan);background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.2);border-radius:10px;cursor:pointer;font-family:inherit">+ Add additional working hours</button>
        </div>
        <div class="modal-footer">
          <div style="display:flex;gap:10px">
            <button onclick="closeModal()" class="btn-secondary" style="flex:1">Cancel</button>
            <button onclick="saveShift('${dstr}')" class="btn-primary" style="flex:1">Save</button>
          </div>
        </div>
      </div>
    </div>`;
}

function chkAttr(label,id,checked,color){
  return`<div onclick="togChk('${id}')" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)">
    <div id="${id}-box" style="width:18px;height:18px;border-radius:4px;border:2px solid ${checked?color:'var(--bg4)'};background:${checked?color+'22':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s" data-on="${checked?'1':'0'}">
      ${checked?`<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" stroke="${color}" stroke-width="2" fill="none"/></svg>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex:1">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <span style="font-size:13px;color:var(--t2)">${label}</span>

  </div>`;
}

function togChk(id){
  const box=el(`${id}-box`);
  const on=box.dataset.on==='1';
  // color mapping
  const colorMap={'sh-planned':'var(--col-planned)','sh-rest':'var(--col-rest)','sh-hol':'var(--col-holiday)','sh-sick':'var(--col-sick)','sh-annual':'var(--col-vacation)'};
  const c=colorMap[id]||'var(--cyan)';
  box.dataset.on=on?'0':'1';
  box.style.borderColor=on?'var(--bg4)':c;
  box.style.background=on?'transparent':c+'22';
  box.innerHTML=on?'':`<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" stroke="${c}" stroke-width="2" fill="none"/></svg>`;
}

function togB2(){
  const btn=el('b2-tog'),th=el('b2-th'),f=el('b2-f');
  const on=f.style.display==='none';
  f.style.display=on?'grid':'none';
  btn.style.background=on?'var(--cyan)':'var(--bg4)';
  th.style.left=on?'20px':'3px';
}

function tIn(label,id,val){
  return`<div style="display:flex;flex-direction:column;gap:4px">
    <label style="font-size:11px;color:var(--t5);text-transform:uppercase;letter-spacing:.05em">${label}</label>
    <input type="time" id="${id}" value="${val}">
  </div>`;
}

function chkVal(id){return el(`${id}-box`)?.dataset.on==='1';}

function saveShift(dstr){
  const entry={
    date:dstr,
    startTime:el('sh-st')?.value||'',
    endTime:el('sh-et')?.value||'',
    break1Start:el('sh-b1s')?.value||'',
    break1End:el('sh-b1e')?.value||'',
    break2Start:el('sh-b2s')?.value||'',
    break2End:el('sh-b2e')?.value||'',
    plannedShift:chkVal('sh-planned'),

}

// TABLE VIEW — FIX #5: tap row → detail popup
// ═══════════════════════════════════════════════
function buildTable(){
  const rows=Object.entries(STATE.entries).sort(([a],[b])=>a.localeCompare(b));
  const workDayMins=STATE.settings.workDayHours*60;
  const div=document.createElement('div');
  div.style.cssText='flex:1;overflow:auto;';
  const cols=['Date','Type','Start','End','Net Time','Day Hrs','Night Hrs','Diff','Planned','Holiday'];
  div.innerHTML=`
    <table style="min-width:640px;width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="background:#0f172a;position:sticky;top:0;z-index:2">
        ${cols.map(c=>`<th style="padding:8px 8px;text-align:left;color:var(--t5);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--bg3)">${c}</th>`).join('')}
      </tr></thead>
      <tbody id="table-body">
        ${rows.length===0?`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--t5)">No entries yet</td></tr>`:''}
        ${rows.map(([date,e],ri)=>{
          const h=calcHours(e);
          const dh=h[date]||{dayMins:0,nightMins:0};
          const net=dh.dayMins+dh.nightMins;
          const diff=e.startTime?net-workDayMins:0;
          const diffStr=diff===0?'':((diff>0?'+':'')+fmtHHMM(Math.abs(diff)));
          const diffCol=diff>0?'#4ade80':diff<0?'#f87171':'var(--t5)';
          const col=entryColor(e,date)||'var(--t4)';
          let typeLabel='—';
          if(e.sickLeave)typeLabel='Sick';
          else if(e.annualLeave)typeLabel='Leave';
          else if(e.isHoliday||isHol(date))typeLabel='Holiday';
          else if(e.restDay)typeLabel='Rest';
          else if(e.plannedShift)typeLabel='Planned';
          else if(e.startTime)typeLabel='Unplanned';
          return`<tr class="trow" onclick="showEntryDetail('${date}')" style="background:${ri%2?'#0a0a0a':'transparent'};border-bottom:1px solid #111;cursor:pointer">
            <td style="padding:7px 8px;color:var(--cyan);font-family:monospace">${date}</td>
            <td style="padding:7px 8px"><span style="background:${col}22;color:${col};padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap">${typeLabel}</span></td>
            <td style="padding:7px 8px;color:var(--t1)">${e.startTime||'—'}</td>
            <td style="padding:7px 8px;color:var(--t1)">${e.endTime||'—'}</td>
            <td style="padding:7px 8px;color:var(--t2);font-family:monospace">${net>0?fmtHHMM(net):'—'}</td>
            <td style="padding:7px 8px;color:var(--green);font-family:monospace">${fmtHHMM(dh.dayMins)}</td>
            <td style="padding:7px 8px;color:var(--blue);font-family:monospace">${fmtHHMM(dh.nightMins)}</td>
            <td style="padding:7px 8px;font-family:monospace;font-weight:600;color:${diffCol}">${diffStr||'—'}</td>
            <td style="padding:7px 8px">${e.plannedShift?'<span style="color:var(--green)">Yes</span>':'<span style="color:var(--t5)">No</span>'}</td>
            <td style="padding:7px 8px">${(e.isHoliday||isHol(date))?'<span style="color:var(--red)">Yes</span>':'<span style="color:var(--t5)">No</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  return div;
}

// FIX #5: entry detail popup
function showEntryDetail(date){
  const e=STATE.entries[date];
  if(!e)return;
  const h=calcHours(e);
  const dh=h[date]||{dayMins:0,nightMins:0};
  const net=dh.dayMins+dh.nightMins;
  const workDayMins=STATE.settings.workDayHours*60;
  const diff=net-workDayMins;
  const diffStr=(diff>0?'+':diff<0?'−':'')+fmtHHMM(Math.abs(diff));
  const diffCol=diff>0?'#4ade80':diff<0?'#f87171':'var(--t4)';

  function detRow(l,v,c='var(--t2)'){return v?`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px"><span style="color:var(--t4)">${l}</span><span style="color:${c};font-weight:600">${v}</span></div>`:''}

  const attrs=[];
  if(e.plannedShift)attrs.push(`<span class="chip" style="background:rgba(34,211,238,.15);color:var(--col-planned)">Planned</span>`);
  if(e.restDay)attrs.push(`<span class="chip" style="background:rgba(167,139,250,.15);color:var(--col-rest)">Rest Day</span>`);
  if(e.isHoliday||isHol(date))attrs.push(`<span class="chip" style="background:rgba(74,222,128,.15);color:var(--col-holiday)">Holiday</span>`);
  if(e.sickLeave)attrs.push(`<span class="chip" style="background:rgba(251,146,60,.15);color:var(--col-sick)">Sick Leave</span>`);
  if(e.annualLeave)attrs.push(`<span class="chip" style="background:rgba(244,114,182,.15);color:var(--col-vacation)">Annual Leave</span>`);

  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box">
        <div class="modal-hdr">
          <div>
            <div style="color:#fff;font-weight:700;font-size:16px">${date}</div>
            <div style="margin-top:4px">${attrs.join('')||'<span style="font-size:11px;color:var(--t5)">No attributes</span>'}</div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--t4);cursor:pointer;padding:4px">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><line x1="14" y1="4" x2="4" y2="14"/><line x1="4" y1="4" x2="14" y2="14"/></svg>
          </button>
        </div>
        <div class="modal-body">
          ${detRow('Start Time',e.startTime)}
          ${detRow('End Time',e.endTime)}
          ${e.break1Start?detRow('Break 1',`${e.break1Start} – ${e.break1End}`):''}
          ${e.break2Start?detRow('Break 2',`${e.break2Start} – ${e.break2End}`):''}
          ${detRow('Net Time',net>0?fmtHHMM(net):'—','var(--t1)')}
          ${detRow('Day Hours',fmtHHMM(dh.dayMins),'var(--green)')}
          ${detRow('Night Hours',fmtHHMM(dh.nightMins),'var(--blue)')}
          ${net>0?detRow('vs Work Day',diffStr,diffCol):''}
          ${detRow('Shift Type',classifyShift(e),'var(--cyan)')}
          ${e.notes&&e.notes.trim()?`<div style="margin-top:10px;background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;color:var(--t2);line-height:1.5"><span style="color:var(--t5);font-size:10px;display:block;margin-bottom:4px">NOTES</span>${e.notes}</div>`:''}
        </div>
        <div class="modal-footer">
          <div style="display:flex;gap:10px">
            <button onclick="closeModal()" class="btn-secondary" style="flex:1">Close</button>
            <button onclick="closeModal();showShiftModal('${date}',STATE.entries['${date}'])" class="btn-primary" style="flex:1">Edit</button>
          </div>
        </div>
      </div>
    </div>`;
}

// GRAPHS VIEW
// ═══════════════════════════════════════════════
function buildGraphs(){
  const yr=STATE.calYear,mo=STATE.calMonth;
  const dim=new Date(yr,mo+1,0).getDate();
  const wls=['W1','W2','W3','W4','W5'];
  const byType={plan:[],off:[],hol:[],both:[]};
  const byShift={am:[],mid:[],pm:[],night:[]};
  for(let w=0;w<5;w++){
    let pl=0,of=0,ho=0,bo=0,am=0,md=0,pm=0,ni=0;
    for(let d=w*7+1;d<=Math.min((w+1)*7,dim);d++){
      const date=new Date(yr,mo,d);const dstr=ds(date);
      const e=STATE.entries[dstr];const ih=isHol(dstr)||e?.isHoliday;const iw=date.getDay()===0||date.getDay()===6;
      if(e?.startTime){
        const h=calcHours(e);const dh=h[dstr]||{dayMins:0,nightMins:0};
        const tot=(dh.dayMins+dh.nightMins)/60;
        if(e.plannedShift)pl+=tot;if(iw&&!ih)of+=tot;if(ih&&!iw)ho+=tot;if(ih&&iw)bo+=tot;
        const sh=classifyShift(e);
        if(sh==='Morning')am+=tot;else if(sh==='Evening')pm+=tot;else if(sh==='Mid')md+=tot;else if(sh==='Night')ni+=tot;
      }
    }
    byType.plan.push(+pl.toFixed(1));byType.off.push(+of.toFixed(1));byType.hol.push(+ho.toFixed(1));byType.both.push(+bo.toFixed(1));
    byShift.am.push(+am.toFixed(1));byShift.mid.push(+md.toFixed(1));byShift.pm.push(+pm.toFixed(1));byShift.night.push(+ni.toFixed(1));
  }

  function miniChart(data,colors){
    const mx=Math.max(...data.flat(),1);
    const W=280,H=110,pl=28,pr=8,pt=8,pb=18,cw=W-pl-pr,ch=H-pt-pb;
    const step=wls.length>1?cw/(wls.length-1):cw;
    function pathD(s){return s.map((v,i)=>`${i===0?'M':'L'}${pl+i*step},${pt+ch-(v/mx)*ch}`).join(' ')}
    return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px">
      ${[0,.5,1].map(v=>`<line x1="${pl}" y1="${pt+ch*(1-v)}" x2="${W-pr}" y2="${pt+ch*(1-v)}" stroke="#1f2937" stroke-width="1"/>`).join('')}
      ${[0,.5,1].map(v=>`<text x="${pl-3}" y="${pt+ch*(1-v)+4}" text-anchor="end" font-size="8" fill="#4b5563">${Math.round(v*mx)}</text>`).join('')}
      ${wls.map((l,i)=>`<text x="${pl+i*step}" y="${H-3}" text-anchor="middle" font-size="8" fill="#4b5563">${l}</text>`).join('')}
      ${data.map((s,si)=>`<path d="${pathD(s)}" fill="none" stroke="${colors[si]}" stroke-width="2" stroke-linejoin="round"/>`).join('')}
      ${data.map((s,si)=>s.map((v,i)=>`<circle cx="${pl+i*step}" cy="${pt+ch-(v/mx)*ch}" r="2.5" fill="${colors[si]}"/>`).join('')).join('')}
    </svg>`;
  }

  const div=document.createElement('div');
  div.style.cssText='flex:1;overflow-y:auto;padding:12px 14px;';
  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="color:#fff;font-weight:700;font-size:16px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('graphs')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('graphs')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    ${[
      {title:'Hours by Day Type',data:[byType.plan,byType.off,byType.hol,byType.both],colors:['#22d3ee','#a78bfa','#4ade80','#f87171'],legend:['Planned','Rest Day','Holiday','Hol+Off']},
      {title:'Hours by Shift Type',data:[byShift.am,byShift.mid,byShift.pm,byShift.night],colors:['#fbbf24','#a78bfa','#fb923c','#60a5fa'],legend:['Morning','Mid','Evening','Night']},
    ].map(ch=>`
      <div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--bg3)">
        <div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:8px">${ch.title}</div>
        ${miniChart(ch.data,ch.colors)}
        <div style="display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:8px">
          ${ch.legend.map((l,i)=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${ch.colors[i]}"></div><span style="font-size:10px;color:var(--t4)">${l}</span></div>`).join('')}
        </div>
      </div>
    `).join('')}`;
  return div;
}

// ═══════════════════════════════════════════════
// BALANCES — FIX #11: progress bars, no "U" suffix
// ═══════════════════════════════════════════════
function buildBalances(){
  const yr=STATE.calYear,mo=STATE.calMonth;
  const s=STATE.settings;
  const wd=workDays(yr,mo);
  const tgtMins=wd*s.workDayHours*60;
  let planM=0,factM=0,sickDays=0,leaveDays=0;
  const dim=new Date(yr,mo+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dstr=ds(new Date(yr,mo,d));const e=STATE.entries[dstr];
    if(!e)continue;
    const h=calcHours(e);const dh=h[dstr]||{dayMins:0,nightMins:0};
    const t=dh.dayMins+dh.nightMins;
    if(e.plannedShift)planM+=t;
    if(e.startTime)factM+=t;
    if(e.sickLeave)sickDays++;
    if(e.annualLeave)leaveDays++;
  }
  const diff=factM-tgtMins;
  // Annual leave: 20 days = 160h standard
  const annualLeaveTarget=20;const leaveAccrued=parseFloat(((mo+1)*1.67).toFixed(2));
  const leavePercent=Math.min(100,(leaveAccrued/annualLeaveTarget)*100);

  function progressRow(label,value,total,valStr,color,note){
    const pct=total>0?Math.min(100,(value/total)*100):0;
    return`<div style="background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--bg3)">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:12px;color:var(--t4)">${label}</span>
        <div style="display:flex;align-items:baseline;gap:6px">
          ${note?`<span style="font-size:10px;color:var(--t5)">${note}</span>`:''}
          <span style="font-size:14px;font-weight:700;color:${color};font-family:monospace">${valStr}</span>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div>
      </div>
      <div style="font-size:10px;color:var(--t5);margin-top:4px;text-align:right">${pct.toFixed(1)}% of ${fmtHHMM(total)||total}</div>
    </div>`;
  }

  const div=document.createElement('div');
  div.style.cssText='flex:1;overflow-y:auto;padding:12px 14px;';
  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="color:#fff;font-weight:700;font-size:18px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('balances')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('balances')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>

    ${progressRow('Target Hours (DLA)',factM,tgtMins,fmtHHMM(tgtMins),'#22d3ee',`${wd} work days`)}
    ${progressRow('Factual Hours Worked',factM,tgtMins,fmtHHMM(factM),'#60a5fa','')}
    ${progressRow('Planned Hours',planM,tgtMins,fmtHHMM(planM),'#a78bfa','')}
    ${progressRow('Annual Leave Accrued',leaveAccrued,annualLeaveTarget,`${leaveAccrued} days`,'#4ade80',`of ${annualLeaveTarget} days`)}

    <!-- Surplus/Deficit -->
    <div style="background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:8px;border:2px solid ${diff>=0?'rgba(74,222,128,.3)':'rgba(248,113,113,.3)'}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--t3)">Surplus / Deficit</span>
        <span style="font-size:18px;font-weight:700;font-family:monospace;color:${diff>=0?'#4ade80':'#f87171'}">${diff>=0?'+':''}${fmtHHMM(Math.abs(diff))}</span>
      </div>
    </div>

    <div style="background:var(--bg2);border-radius:12px;padding:14px;border:1px solid var(--bg3)">
      <div style="font-size:11px;color:var(--t5);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Month Summary</div>
      ${[
        ['Working days',wd,'#d1d5db'],
        ['Work day duration',`${s.workDayHours}h netto`,'#d1d5db'],
        ['Sick leave days',sickDays,'#fb923c'],
        ['Annual leave days',leaveDays,'#f472b6'],
        ['Leave accrued (YTD)',`${leaveAccrued} / ${annualLeaveTarget} days`,'#4ade80'],
      ].map(([l,v,c],i)=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;${i<4?'border-bottom:1px solid #111827':''}">
          <span style="color:var(--t4)">${l}</span>
          <span style="color:${c};font-weight:600">${v}</span>
        </div>`).join('')}
    </div>`;
  return div;
}

// ═══════════════════════════════════════════════
// PAYSLIP
// ═══════════════════════════════════════════════
function buildPayslip(){
  const yr=STATE.calYear,mo=STATE.calMonth;
  const s=STATE.settings;
  const dim=new Date(yr,mo+1,0).getDate();
  let dayM=0,nightM=0,wDays=0;
  for(let d=1;d<=dim;d++){
    const dstr=ds(new Date(yr,mo,d));const e=STATE.entries[dstr];
    if(!e?.startTime)continue;
    const h=calcHours(e);const dh=h[dstr]||{dayMins:0,nightMins:0};
    dayM+=dh.dayMins;nightM+=dh.nightMins;wDays++;
  }
  const totalH=(dayM+nightM)/60,nightH=nightM/60;
  const base=totalH*s.hourlyRate;
  const nightP=nightH*s.hourlyRate*(s.nightRate-1);
  const gross=base+nightP;
  const npd=s.npd==='none'?0:s.npd==='standard'?400:300;
  const gpm=Math.max(0,gross-npd)*0.20;
  const sodra=gross*0.195;
  const pension=s.pension?gross*(s.pensionCustom?s.pensionRate/100:.03):0;
  const deduct=gpm+sodra+pension;
  const net=gross-deduct;
  const empTax=gross*0.0316;
  const mLbl=`${String(mo+1).padStart(2,'0')}/${yr}`;

  function tRow(code,name,m,days,hrs,sum,c='#9ca3af',bold=false){
    return`<tr style="border-bottom:1px solid rgba(31,41,55,.5)">
      <td style="padding:7px 8px;font-size:10px;color:var(--t5);font-family:monospace">${code}</td>
      <td style="padding:7px 8px;font-size:11px;color:${c};font-weight:${bold?700:400}">${name}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${m||''}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${days||'—'}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--t4);text-align:center">${hrs||'—'}</td>
      <td style="padding:7px 8px;font-size:11px;font-weight:700;text-align:right;color:${c}">${sum}</td>
    </tr>`;
  }
  function secRow(lbl,c){return`<tr><td colspan="6" style="padding:6px 8px;font-size:10px;color:${c};font-weight:700;background:rgba(31,41,55,.4);letter-spacing:.08em;text-transform:uppercase">${lbl}</td></tr>`}
  function totRow(lbl,days,hrs,sum,c){return`<tr style="background:rgba(31,41,55,.3)"><td colspan="3" style="padding:8px;font-size:11px;font-weight:700;color:${c}">${lbl}</td><td style="padding:8px;font-size:11px;color:#fff;text-align:center;font-weight:700">${days||''}</td><td style="padding:8px;font-size:11px;color:#fff;text-align:center;font-weight:700">${hrs||''}</td><td style="padding:8px;font-size:12px;font-weight:700;text-align:right;color:${c}">${sum}</td></tr>`}

  const div=document.createElement('div');
  div.style.cssText='flex:1;overflow-y:auto;padding:10px 8px;';
  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 6px">
      <span style="color:#fff;font-weight:700;font-size:17px">${MONTHS[mo]} ${yr}</span>
      <div style="display:flex;gap:2px">
        <button onclick="calNav(-1);setTab('payslip')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,14 6,9 11,4"/></svg></button>
        <button onclick="calNav(1);setTab('payslip')" style="padding:5px;background:none;border:none;color:var(--t4);cursor:pointer"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,14 12,9 7,4"/></svg></button>
      </div>
    </div>
    <div style="background:var(--bg2);border-radius:14px;overflow:hidden;border:1px solid var(--bg3)">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:rgba(31,41,55,.6)">
          ${['Code','Name','Mo','Days','Hrs','Sum €'].map(h=>`<th style="padding:8px;font-size:10px;color:var(--t5);font-weight:500;text-align:${h==='Sum €'?'right':'left'};border-bottom:1px solid var(--bg3)">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${secRow('Priskaityta — Gross','#22d3ee')}
          ${tRow('1','Base Salary',mLbl,wDays,totalH.toFixed(2),`${base.toFixed(2)}€`,'#f9fafb',true)}
          ${nightH>0?tRow('1.1','Night Work Premium',mLbl,'',nightH.toFixed(2),`${nightP.toFixed(2)}€`,'#60a5fa'):''}
          ${totRow('GROSS TOTAL:',wDays,totalH.toFixed(2),`${gross.toFixed(2)}€`,'#22d3ee')}
          ${secRow('Atskaityta — Deductions','#f87171')}
          ${tRow('1-20','Income Tax (GPM 20%)',mLbl,'','',`-${gpm.toFixed(2)}€`,'#f87171')}
          ${tRow('11-22.5','Employee Social Ins. 19.5%',mLbl,'','',`-${sodra.toFixed(2)}€`,'#fb923c')}
          ${s.pension?tRow('3',`Pension Fund ${s.pensionCustom?s.pensionRate:3}%`,mLbl,'','',`-${pension.toFixed(2)}€`,'#fb923c'):''}
          ${totRow('DEDUCTIONS TOTAL:','','',`-${deduct.toFixed(2)}€`,'#f87171')}
          ${secRow('Išmokėta — Net Pay','#4ade80')}
          ${totRow('NET PAY:',wDays,totalH.toFixed(2),`${net.toFixed(2)}€`,'#4ade80')}
        </tbody>
      </table>
      <div style="border-top:2px solid var(--bg4);padding:10px 12px">
        ${[['Accrued Leave','+1.67 days','#4ade80'],['Leave Balance','1.67 days','#4ade80'],['Employer Tax (~3.16%)',`${empTax.toFixed(2)}€`,'#fbbf24'],['Hourly Rate',`${s.hourlyRate.toFixed(2)}€/hr`,'#9ca3af'],['NPD Applied',`${npd.toFixed(2)}€`,'#9ca3af']].map(([l,v,c],i)=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;${i<4?'border-bottom:1px solid rgba(31,41,55,.5)':''}">
            <span style="color:var(--t4)">${l}</span>
            <span style="color:${c};font-weight:600;font-family:monospace">${v}</span>
          </div>`).join('')}
      </div>
    </div>`;
  return div;
}

// SETTINGS — FIX #1: safe read + restore defaults
// ═══════════════════════════════════════════════
function showSettings(){
  const s=STATE.settings;
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box">
        <div class="modal-hdr">
          <span style="color:#fff;font-weight:700;font-size:16px">Settings</span>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--t4);cursor:pointer;padding:4px">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><line x1="14" y1="4" x2="4" y2="14"/><line x1="4" y1="4" x2="14" y2="14"/></svg>
          </button>
        </div>
        <div style="display:flex;gap:8px;padding:10px 18px 0">
          <button onclick="stTab('main')" id="st-main" style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--cyan);color:#000;font-family:inherit">Main</button>
          <button onclick="stTab('adv')" id="st-adv" style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--t4);font-family:inherit">Advanced</button>
        </div>
        <div id="st-body" class="modal-body">${stMainHTML(s)}</div>
        <div class="modal-footer" style="display:flex;flex-direction:column;gap:8px">
          <button onclick="saveSettings()" class="btn-primary">Save Settings</button>
          <button onclick="confirmRestoreDefaults()" class="btn-reset">↺ Restore Default Settings</button>
        </div>
      </div>
    </div>`;
}

function stTab(t){
  el('st-main').style.background=t==='main'?'var(--cyan)':'transparent';
  el('st-main').style.color=t==='main'?'#000':'var(--t4)';
  el('st-adv').style.background=t==='adv'?'var(--cyan)':'transparent';
  el('st-adv').style.color=t==='adv'?'#000':'var(--t4)';
  el('st-body').innerHTML=t==='main'?stMainHTML(STATE.settings):stAdvHTML(STATE.settings);
}

function stMainHTML(s){
  return`
    <div class="section-hdr">Time Boundaries</div>
    ${nIn('Night Start (hour)','s-nightStart',s.nightStart,1)}
    ${nIn('Night End (hour)','s-nightEnd',s.nightEnd,1)}
    <div class="section-hdr" style="margin-top:12px">Work Day</div>
    ${nIn('Work Day Duration (hours netto)','s-workDayHours',s.workDayHours,.5)}
    <div class="section-hdr" style="margin-top:12px">Premium Rates (×)</div>
    ${nIn('Night Rate','s-nightRate',s.nightRate,.1)}
    ${nIn('Holiday Rate','s-holidayRate',s.holidayRate,.1)}
    ${nIn('Rest Day Rate','s-restDayRate',s.restDayRate,.1)}
    ${nIn('Night on Holiday','s-nightHolidayRate',s.nightHolidayRate,.1)}
    ${nIn('Overtime Rate','s-otRate',s.otRate,.1)}
    ${nIn('Rest Day on Holiday','s-restHolidayRate',s.restHolidayRate,.1)}
    <div class="section-hdr" style="margin-top:12px">Pay</div>
    ${nIn('Base Hourly Rate (€)','s-hourlyRate',s.hourlyRate,.01)}
    <div style="margin-top:8px">
      ${togRow('Cumulative DLA','s-cumulativeDLA',s.cumulativeDLA)}
      ${togRow('Show Week Numbers','s-showWeekNumbers',s.showWeekNumbers)}
    </div>`;
}

function stAdvHTML(s){
  return`
    <div class="section-hdr">Taxes</div>
    <div class="row"><label class="row-lbl">NPD</label>
      <select id="s-npd" style="width:160px">
        <option value="standard"${s.npd==='standard'?' selected':''}>Standard</option>
        <option value="0_25"${s.npd==='0_25'?' selected':''}>0–25% capacity</option>
        <option value="30_55"${s.npd==='30_55'?' selected':''}>30–55% capacity</option>
        <option value="none"${s.npd==='none'?' selected':''}>None</option>
      </select>
    </div>
    <div class="row"><label class="row-lbl">Employer Group</label>
      <select id="s-employerGroup" style="width:100px">
        ${[1,2,3,4].map(g=>`<option value="${g}"${s.employerGroup===g?' selected':''}>${g}</option>`).join('')}
      </select>
    </div>
    ${togRow('Pension Fund','s-pension',s.pension)}
    ${togRow('Custom Pension Rate','s-pensionCustom',s.pensionCustom)}
    ${nIn('Pension Rate (%)','s-pensionRate',s.pensionRate,.1)}
    ${togRow('Terminated Contract','s-terminatedContract',s.terminatedContract)}
    <div class="section-hdr" style="margin-top:12px">Paydays</div>
    ${togRow('Show Paydays','s-showPaydays',s.showPaydays)}
    ${nIn('Advance Day','s-advanceDay',s.advanceDay,1)}
    ${nIn('Salary Day','s-salaryDay',s.salaryDay,1)}`;
}

function nIn(label,id,val,step=0.01){
  // FIX #1: always show actual value, never blank/0 unless truly 0
  const v=(val!==undefined&&val!==null&&!isNaN(val))?val:DEFAULT_SETTINGS[id.replace('s-','')]||0;
  return`<div class="row"><label class="row-lbl">${label}</label><input type="number" id="${id}" value="${v}" step="${step}" style="width:90px;text-align:right"></div>`;
}

function togRow(label,id,val){
  return`<div class="row"><label class="row-lbl">${label}</label>
    <button id="${id}" onclick="this.dataset.on=this.dataset.on==='1'?'0':'1';this.style.background=this.dataset.on==='1'?'var(--cyan)':'var(--bg4)';this.children[0].style.left=this.dataset.on==='1'?'20px':'3px'"
      data-on="${val?'1':'0'}" class="toggle" style="background:${val?'var(--cyan)':'var(--bg4)'}">
      <div class="toggle-thumb" style="left:${val?'20px':'3px'}"></div>
    </button>
  </div>`;
}

function confirmRestoreDefaults(){
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade" style="z-index:300">
      <div class="modal-box" style="max-width:320px">
        <div class="modal-hdr"><span style="color:#fff;font-weight:700">Restore Defaults?</span></div>
        <div class="modal-body">
          <p style="color:var(--t3);font-size:13px;margin-bottom:16px">All settings will be reset to factory defaults. Your shift entries will NOT be deleted.</p>
          <div style="display:flex;gap:10px">
            <button onclick="showSettings()" class="btn-secondary" style="flex:1">Cancel</button>
            <button onclick="restoreDefaults()" class="btn-danger">Restore</button>
          </div>
        </div>
      </div>
    </div>`;
}

function restoreDefaults(){
  STATE.settings={...DEFAULT_SETTINGS};
  saveToDrive();
  closeModal();
  showToast('Settings restored to defaults','#4ade80');
  renderCurrentTab();
}

// FIX #1: Safe settings save — always merge with defaults
function saveSettings(){
  function gv(id,def){const e=el(id);if(!e)return def;const v=parseFloat(e.value);return(isNaN(v)||v===0&&def!==0)?def:v;}
  function gi(id,def){const e=el(id);if(!e)return def;const v=parseInt(e.value);return(isNaN(v))?def:v;}
  function gs(id,def){const e=el(id);return e?e.value:def;}
  function gb(id,def){const e=el(id);return e?e.dataset.on==='1':def;}

  const d=DEFAULT_SETTINGS;
  STATE.settings={
    nightStart:gv('s-nightStart',d.nightStart),
    nightEnd:gv('s-nightEnd',d.nightEnd),
    nightRate:gv('s-nightRate',d.nightRate),
    holidayRate:gv('s-holidayRate',d.holidayRate),
    restDayRate:gv('s-restDayRate',d.restDayRate),
    nightHolidayRate:gv('s-nightHolidayRate',d.nightHolidayRate),
    otRate:gv('s-otRate',d.otRate),
    restHolidayRate:gv('s-restHolidayRate',d.restHolidayRate),
    hourlyRate:gv('s-hourlyRate',d.hourlyRate),
    workDayHours:gv('s-workDayHours',d.workDayHours),
    cumulativeDLA:gb('s-cumulativeDLA',d.cumulativeDLA),
    showWeekNumbers:gb('s-showWeekNumbers',d.showWeekNumbers),
    npd:gs('s-npd',d.npd),
    employerGroup:gi('s-employerGroup',d.employerGroup),
    pension:gb('s-pension',d.pension),
    pensionRate:gv('s-pensionRate',d.pensionRate),
    pensionCustom:gb('s-pensionCustom',d.pensionCustom),
    terminatedContract:gb('s-terminatedContract',d.terminatedContract),
    showPaydays:gb('s-showPaydays',d.showPaydays),
    advanceDay:gi('s-advanceDay',d.advanceDay),
    salaryDay:gi('s-salaryDay',d.salaryDay),
  };
  saveToDrive();closeModal();
  showToast('Settings saved','#4ade80');
  renderCurrentTab();
}

            <div style="font-size:28px;margin-bottom:8px">📂</div>
            <div style="color:var(--t2);font-size:13px;font-weight:600">Tap to choose file</div>
            <div style="color:var(--t5);font-size:11px;margin-top:4px">.json or .csv</div>
          </div>
          <input type="file" id="import-file" accept=".json,.csv" style="display:none" onchange="handleImportFile(this)">
        </div>
      </div>
    </div>`;
}

function handleImportFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      let imported={};let errors=[];
      if(file.name.endsWith('.json')){
        const parsed=JSON.parse(text);
        imported=parsed.entries||parsed;
        if(typeof imported!=='object')throw new Error('Invalid JSON structure');
      } else if(file.name.endsWith('.csv')){
        const lines=text.split('\n').filter(l=>l.trim());
        const headers=lines[0].split(',').map(h=>h.trim());
        for(let i=1;i<lines.length;i++){
          const vals=lines[i].split(',');
          const row={};headers.forEach((h,j)=>row[h]=vals[j]?.trim()||'');
          if(!row.date||!/^\d{4}-\d{2}-\d{2}$/.test(row.date)){errors.push(`Row ${i}: invalid date "${row.date}"`);continue;}
          imported[row.date]={date:row.date,startTime:row.startTime||row.start||'',endTime:row.endTime||row.end||'',break1Start:row.break1Start||'',break1End:row.break1End||'',plannedShift:row.planned==='Yes'||row.plannedShift==='true',isHoliday:row.holiday==='Yes'||row.isHoliday==='true',notes:row.notes||''};
        }
      } else {
        throw new Error('Unsupported file type');
      }
      if(errors.length>0){
        showImportError(errors);return;
      }
      // Merge
      STATE.entries={...STATE.entries,...imported};
      saveToDrive();renderCurrentTab();
      closeModal();
      showImportSuccess(Object.keys(imported).length);
    }catch(err){
      showImportError([err.message]);
    }
  };
  reader.readAsText(file);
}

function showImportSuccess(count){
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box" style="max-width:320px;text-align:center">
        <div class="modal-body" style="padding:32px 18px">
          <div style="font-size:40px;margin-bottom:16px">🎉</div>
          <div style="color:#fff;font-weight:700;font-size:16px;margin-bottom:8px">Wow, you did a really great job!</div>
          <div style="color:var(--t3);font-size:13px;margin-bottom:24px">Everything is done on my side.<br><span style="color:var(--cyan);font-weight:600">${count} entries</span> imported successfully.</div>
          <button onclick="closeModal()" class="btn-primary">OK</button>
        </div>
      </div>
    </div>`;
}

function showImportError(errors){
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box" style="max-width:340px">
        <div class="modal-hdr"><span style="color:var(--red);font-weight:700;font-size:15px">F**k! Import Failed</span></div>
        <div class="modal-body">
          <p style="color:var(--t3);font-size:13px;margin-bottom:12px">Looks like there are some mistakes in your file. If you want to check them, let me know.</p>
          <div style="background:var(--bg3);border-radius:8px;padding:10px;max-height:200px;overflow-y:auto">
            ${errors.map(e=>`<div style="font-size:11px;color:var(--red);font-family:monospace;padding:2px 0">${e}</div>`).join('')}
          </div>
        </div>
        <div class="modal-footer">
          <div style="display:flex;gap:10px">
            <button onclick="closeModal()" class="btn-secondary" style="flex:1">Forget it</button>
            <button onclick="downloadImportLog(${JSON.stringify(errors).replace(/"/g,'&quot;')})" class="btn-danger" style="flex:1">Download log</button>
          </div>
        </div>
      </div>
    </div>`;
}

function downloadImportLog(errors){
  const text=`KairoShift Import Error Log\n${new Date().toISOString()}\n\n${errors.join('\n')}`;
  downloadFile('kairoshift_import_errors.txt',text,'text/plain');
}

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
function showExport(){
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box" style="max-width:340px">
        <div class="modal-hdr">
          <span style="color:#fff;font-weight:700;font-size:15px">Export Data</span>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--t4);cursor:pointer;padding:4px">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><line x1="14" y1="4" x2="4" y2="14"/><line x1="4" y1="4" x2="14" y2="14"/></svg>
          </button>
        </div>
        <div class="modal-body">
          ${[
            ['exportJSON()','Full Export (JSON)','.json — with all attributes','#4ade80'],
            ['exportCSV()','Export CSV','.csv — spreadsheet format','#60a5fa'],
          ].map(([fn,title,sub,c])=>`
            <button onclick="${fn}" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border-radius:10px;margin-bottom:8px;border:none;cursor:pointer;text-align:left;font-family:inherit">
              <div style="width:36px;height:36px;border-radius:8px;background:${c}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📊</div>
              <div><div style="color:#fff;font-size:12px;font-weight:600">${title}</div><div style="color:var(--t4);font-size:11px">${sub}</div></div>
            </button>`).join('')}
          <button onclick="closeModal()" class="btn-secondary" style="margin-top:4px">Close</button>
        </div>
      </div>
    </div>`;
}

function exportJSON(){
  const data=JSON.stringify({entries:STATE.entries,exportedAt:new Date().toISOString()},null,2);
  downloadFile('kairoshift_export.json',data,'application/json');
  showToast('JSON exported');
}

function exportCSV(){
  const cols=['date','startTime','endTime','break1Start','break1End','break2Start','break2End','dayHrs','nightHrs','netHrs','diff','plannedShift','restDay','isHoliday','sickLeave','annualLeave','notes'];
  const wdm=STATE.settings.workDayHours*60;
  const rows=Object.entries(STATE.entries).sort(([a],[b])=>a.localeCompare(b)).map(([date,e])=>{
    const h=calcHours(e);const dh=h[date]||{dayMins:0,nightMins:0};
    const net=dh.dayMins+dh.nightMins;const diff=net-wdm;
    return[date,e.startTime||'',e.endTime||'',e.break1Start||'',e.break1End||'',e.break2Start||'',e.break2End||'',
      fmtHHMM(dh.dayMins),fmtHHMM(dh.nightMins),fmtHHMM(net),fmtHHMM(diff),
      e.plannedShift?'Yes':'No',e.restDay?'Yes':'No',(e.isHoliday||isHol(date))?'Yes':'No',
      e.sickLeave?'Yes':'No',e.annualLeave?'Yes':'No',
      `"${(e.notes||'').replace(/"/g,'""')}"`].join(',');
  });
  downloadFile('kairoshift_export.csv',[cols.join(','),...rows].join('\n'),'text/csv');
  showToast('CSV exported');
}

function downloadFile(name,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function showConnect(){
  el('modal-root').innerHTML=`
    <div class="modal-wrap fade">
      <div class="modal-box" style="max-width:340px">
        <div class="modal-hdr">
          <span style="color:#fff;font-weight:700;font-size:15px">Database Connection</span>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--t4);cursor:pointer;padding:4px">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><line x1="14" y1="4" x2="4" y2="14"/><line x1="4" y1="4" x2="14" y2="14"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div style="color:${STATE.driveConnected?'var(--green)':'var(--red)'};font-size:13px;margin-bottom:12px">${STATE.driveConnected?'✓ Connected to Google Drive':'✗ Not connected to Drive'}</div>
          ${STATE.driveFileId?`<div style="color:var(--t5);font-size:11px;word-break:break-all;margin-bottom:12px">File ID: ${STATE.driveFileId}</div>`:''}
          <p style="color:var(--t4);font-size:12px">Your data is stored as <code style="color:var(--cyan)">kairoshift.kash</code> in your private Google Drive.</p>
          ${STATE.accessToken?`<button onclick="loadFromDrive().then(()=>{closeModal();renderCurrentTab();showToast('Synced from Drive')})" class="btn-primary" style="margin-top:16px">Sync from Drive</button>`:''}
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function toggleSidebar(){
  const sb=el('sidebar'),bd=el('sidebar-backdrop');
  const open=sb.style.transform==='none'||sb.style.transform==='';
  sb.style.transform=open?'translateX(-100%)':'none';
  bd.style.display=open?'none':'block';
}

function closeModal(){el('modal-root').innerHTML='';}

function addExtraBlock(){showToast('Save this entry first, then add a second entry for the same date');}

let toastTimer;
function showToast(msg,color='#22d3ee'){
  let t=el('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;transition:opacity .3s;pointer-events:none;max-width:300px;text-align:center;white-space:pre-line';document.body.appendChild(t);}
  t.style.background=color;t.style.color=color==='#22d3ee'||color==='#4ade80'?'#000':'#fff';
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.opacity='0',2800);
}

  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/kairoshift/sw.js')
      .catch(e=>console.warn('SW:',e));
  });
}
